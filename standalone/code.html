<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>2048</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #faf8ef;
      color: #776e65;
      font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
      font-size: 18px;
    }

    body {
      margin: 80px 0;
    }

    .heading:after {
      content: "";
      display: block;
      clear: both;
    }

    h1.title {
      font-size: 80px;
      font-weight: bold;
      margin: 0;
      display: block;
      float: left;
    }

    @keyframes move-up {
      0% {
        top: 25px;
        opacity: 1;
      }
      100% {
        top: -50px;
        opacity: 0;
      }
    }

    .scores-container {
      float: right;
      text-align: right;
    }

    .score-container, .best-container {
      position: relative;
      display: inline-block;
      background: #bbada0;
      padding: 15px 25px;
      font-size: 25px;
      height: 25px;
      line-height: 47px;
      font-weight: bold;
      border-radius: 3px;
      color: white;
      margin-top: 8px;
      text-align: center;
    }

    .score-container:after, .best-container:after {
      position: absolute;
      width: 100%;
      top: 10px;
      left: 0;
      text-transform: uppercase;
      font-size: 13px;
      line-height: 13px;
      text-align: center;
      color: #eee4da;
    }

    .score-container .score-addition, .best-container .score-addition {
      position: absolute;
      right: 30px;
      font-size: 25px;
      line-height: 25px;
      font-weight: bold;
      color: rgba(119, 110, 101, 0.9);
      z-index: 100;
      animation: move-up 600ms ease-in;
      animation-fill-mode: both;
    }

    .score-container:after {
      content: "Score";
    }

    .best-container:after {
      content: "Best";
    }

    p {
      margin-top: 0;
      margin-bottom: 10px;
      line-height: 1.65;
    }

    a {
      color: #776e65;
      font-weight: bold;
      text-decoration: underline;
      cursor: pointer;
    }

    strong.important {
      text-transform: uppercase;
    }

    hr {
      border: none;
      border-bottom: 1px solid #d8d4d0;
      margin-top: 20px;
      margin-bottom: 30px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }

    @keyframes fade-in {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    .game-container {
      margin: 40px auto 0;
      position: relative;
      padding: 15px;
      cursor: default;
      -webkit-touch-callout: none;
      -ms-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -ms-touch-action: none;
      touch-action: none;
      background: #bbada0;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .game-container .game-message {
      display: none;
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: rgba(238, 228, 218, 0.5);
      z-index: 100;
      text-align: center;
      animation: fade-in 800ms ease 1200ms;
      animation-fill-mode: both;
    }

    .game-container .game-message p {
      font-size: 60px;
      font-weight: bold;
      height: 60px;
      line-height: 60px;
      margin-top: 222px;
    }

    .game-container .game-message .lower {
      display: block;
      margin-top: 59px;
    }

    .game-container .game-message a {
      display: inline-block;
      background: #8f7a66;
      border-radius: 3px;
      padding: 0 20px;
      text-decoration: none;
      color: #f9f6f2;
      height: 40px;
      line-height: 42px;
      margin-left: 9px;
    }

    .game-container .game-message a.keep-playing-button {
      display: none;
    }

    .game-container .game-message.game-won {
      background: rgba(237, 194, 46, 0.5);
      color: #f9f6f2;
    }

    .game-container .game-message.game-won a.keep-playing-button {
      display: inline-block;
    }

    .game-container .game-message.game-won, .game-container .game-message.game-over {
      display: block;
    }

    .grid-container {
      position: absolute;
      z-index: 1;
    }

    .grid-row {
      margin-bottom: 15px;
    }

    .grid-row:last-child {
      margin-bottom: 0;
    }

    .grid-row:after {
      content: "";
      display: block;
      clear: both;
    }

    .grid-cell {
      margin-right: 15px;
      float: left;
      border-radius: 3px;
      background: rgba(238, 228, 218, 0.35);
    }

    .grid-cell:last-child {
      margin-right: 0;
    }

    .tile-container {
      position: absolute;
      z-index: 2;
    }

    .tile {
      position: absolute;
      transition: 100ms ease-in-out;
      transition-property: transform;
    }

    .tile .tile-inner {
      border-radius: 3px;
      background: #eee4da;
      text-align: center;
      font-weight: bold;
      z-index: 10;
    }

    .tile.tile-2 .tile-inner {
      background: #eee4da;
      box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0), inset 0 0 0 1px rgba(255, 255, 255, 0);
    }

    .tile.tile-4 .tile-inner {
      background: #ede0c8;
      box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0), inset 0 0 0 1px rgba(255, 255, 255, 0);
    }

    .tile.tile-8 .tile-inner {
      color: #f9f6f2;
      background: #f2b179;
    }

    .tile.tile-16 .tile-inner {
      color: #f9f6f2;
      background: #f59563;
    }

    .tile.tile-32 .tile-inner {
      color: #f9f6f2;
      background: #f67c5f;
    }

    .tile.tile-64 .tile-inner {
      color: #f9f6f2;
      background: #f65e3b;
    }

    .tile.tile-128 .tile-inner {
      color: #f9f6f2;
      background: #edcf72;
      box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.2381), inset 0 0 0 1px rgba(255, 255, 255, 0.14286);
    }

    .tile.tile-256 .tile-inner {
      color: #f9f6f2;
      background: #edcc61;
      box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.31746), inset 0 0 0 1px rgba(255, 255, 255, 0.19048);
    }

    .tile.tile-512 .tile-inner {
      color: #f9f6f2;
      background: #edc850;
      box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.39683), inset 0 0 0 1px rgba(255, 255, 255, 0.2381);
    }

    .tile.tile-1024 .tile-inner {
      color: #f9f6f2;
      background: #edc53f;
      box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.47619), inset 0 0 0 1px rgba(255, 255, 255, 0.28571);
    }

    .tile.tile-2048 .tile-inner {
      color: #f9f6f2;
      background: #edc22e;
      box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.55556), inset 0 0 0 1px rgba(255, 255, 255, 0.33333);
    }

    .tile.tile-super .tile-inner {
      color: #f9f6f2;
      background: #3c3a32;
    }

    @keyframes appear {
      0% {
        opacity: 0;
        transform: scale(0);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .tile-new .tile-inner {
      animation: appear 200ms ease 100ms;
      animation-fill-mode: backwards;
    }

    @keyframes pop {
      0% {
        transform: scale(0);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    .tile-merged .tile-inner {
      z-index: 20;
      animation: pop 200ms ease 100ms;
      animation-fill-mode: backwards;
    }

    .above-game:after {
      content: "";
      display: block;
      clear: both;
    }

    .game-intro {
      float: left;
      line-height: 42px;
      margin-bottom: 0;
    }

    .restart-button {
      display: inline-block;
      background: #8f7a66;
      border-radius: 3px;
      padding: 0 20px;
      text-decoration: none;
      color: #f9f6f2;
      height: 40px;
      line-height: 42px;
      display: block;
      text-align: center;
      float: right;
    }

    .undo-button {
      display: inline-block;
      background: #8f7a66;
      border-radius: 3px;
      padding: 0 20px;
      text-decoration: none;
      color: #f9f6f2;
      height: 40px;
      line-height: 42px;
      text-align: center;
      margin: 20px auto 0;
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
      cursor: pointer;
      border: none;
      font-size: 18px;
      font-weight: bold;
      font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
      display: block;
    }

    .undo-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .undo-button:not(:disabled):hover {
      background: #9f8a76;
    }

    .grid-size-selector {
      margin: 20px auto 0;
      padding: 20px;
      background: #bbada0;
      border-radius: 6px;
      max-width: 760px;
    }

    .grid-size-selector h3 {
      margin: 0 0 15px 0;
      color: #f9f6f2;
      font-size: 16px;
      text-transform: uppercase;
    }

    .preset-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .preset-btn {
      background: #8f7a66;
      color: #f9f6f2;
      border: none;
      border-radius: 3px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
    }

    .preset-btn:hover {
      background: #9f8a76;
    }

    .preset-btn.active {
      background: #776e65;
    }

    .custom-grid-inputs {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .input-group label {
      color: #f9f6f2;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .input-group input {
      width: 60px;
      padding: 8px;
      border: none;
      border-radius: 3px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
    }

    .apply-custom-btn {
      background: #4ade80;
      color: #111827;
      border: none;
      border-radius: 3px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
    }

    .apply-custom-btn:hover {
      background: #22c55e;
    }

    .grid-info {
      margin-top: 10px;
      color: #f9f6f2;
      font-size: 14px;
    }

    .game-explanation {
      margin-top: 50px;
    }

    @media screen and (max-width: 520px) {
      html, body {
        font-size: 15px;
      }
      body {
        margin: 20px 0;
        padding: 0 20px;
      }
      h1.title {
        font-size: 27px;
        margin-top: 15px;
      }
      .preset-buttons {
        gap: 5px;
      }
      .preset-btn {
        padding: 6px 12px;
        font-size: 12px;
      }
      .custom-grid-inputs {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="heading">
      <h1 class="title">2048</h1>
      <div class="scores-container">
        <div class="score-container">0</div>
        <div class="best-container">0</div>
      </div>
    </div>

    <div class="above-game">
      <p class="game-intro">Join the numbers and get to the <strong>2048 tile!</strong></p>
      <a class="restart-button">New Game</a>
    </div>

    <div class="game-container" id="game-container">
      <div class="game-message">
        <p></p>
        <div class="lower">
          <a class="keep-playing-button">Keep going</a>
          <a class="retry-button">Try again</a>
        </div>
      </div>

      <div class="grid-container" id="grid-container"></div>
      <div class="tile-container"></div>
    </div>

    <button class="undo-button" id="undo-button" disabled>Undo</button>

    <div class="grid-size-selector">
      <h3>Grid Size</h3>
      <div class="preset-buttons">
        <button class="preset-btn" data-width="3" data-height="3">3×3</button>
        <button class="preset-btn active" data-width="4" data-height="4">4×4</button>
        <button class="preset-btn" data-width="5" data-height="5">5×5</button>
        <button class="preset-btn" data-width="6" data-height="6">6×6</button>
        <button class="preset-btn" data-width="7" data-height="7">7×7</button>
      </div>
      <div class="custom-grid-inputs">
        <div class="input-group">
          <label>Width</label>
          <input type="number" id="custom-width" min="3" max="10" value="4">
        </div>
        <div class="input-group">
          <label>Height</label>
          <input type="number" id="custom-height" min="3" max="10" value="4">
        </div>
        <button class="apply-custom-btn" id="apply-custom">Apply Custom</button>
      </div>
      <div class="grid-info">
        Current grid: <span id="current-grid-size">4×4</span>
      </div>
    </div>

    <p class="game-explanation">
      <strong class="important">How to play:</strong> Use your <strong>arrow keys</strong> to move the tiles. When two tiles with the same number touch, they <strong>merge into one!</strong>
    </p>
  </div>

  <script>
    // Polyfills and supporting code
    if (!Function.prototype.bind) {
      Function.prototype.bind = function(oThis) {
        var aArgs = Array.prototype.slice.call(arguments, 1),
            fToBind = this,
            fNOP = function() {},
            fBound = function() {
              return fToBind.apply(this instanceof fNOP ? this : oThis,
                aArgs.concat(Array.prototype.slice.call(arguments)));
            };
        fNOP.prototype = this.prototype;
        fBound.prototype = new fNOP();
        return fBound;
      };
    }

    (function() {
      var lastTime = 0;
      var vendors = ['ms', 'moz', 'webkit', 'o'];
      for(var x = 0; x < vendors.length && !window.requestAnimationFrame; ++x) {
        window.requestAnimationFrame = window[vendors[x]+'RequestAnimationFrame'];
        window.cancelAnimationFrame = window[vendors[x]+'CancelAnimationFrame'] || window[vendors[x]+'CancelRequestAnimationFrame'];
      }
      if (!window.requestAnimationFrame)
        window.requestAnimationFrame = function(callback) {
          var currTime = new Date().getTime();
          var timeToCall = Math.max(0, 16 - (currTime - lastTime));
          var id = window.setTimeout(function() { callback(currTime + timeToCall); }, timeToCall);
          lastTime = currTime + timeToCall;
          return id;
        };
      if (!window.cancelAnimationFrame)
        window.cancelAnimationFrame = function(id) {
          clearTimeout(id);
        };
    }());

    // Fake storage for browsers that don't support localStorage
    window.fakeStorage = {
      _data: {},
      setItem: function(id, val) {
        return this._data[id] = String(val);
      },
      getItem: function(id) {
        return this._data.hasOwnProperty(id) ? this._data[id] : undefined;
      },
      removeItem: function(id) {
        return delete this._data[id];
      },
      clear: function() {
        return this._data = {};
      }
    };

    // LocalStorageManager
    function LocalStorageManager() {
      this.bestScoreKey = "bestScore";
      this.gameStateKey = "gameState";
      var supported = this.localStorageSupported();
      this.storage = supported ? window.localStorage : window.fakeStorage;
    }

    LocalStorageManager.prototype.localStorageSupported = function() {
      var testKey = "test";
      try {
        var storage = window.localStorage;
        storage.setItem(testKey, "1");
        storage.removeItem(testKey);
        return true;
      } catch (error) {
        return false;
      }
    };

    LocalStorageManager.prototype.getBestScore = function(key) {
      return this.storage.getItem(key || this.bestScoreKey) || 0;
    };

    LocalStorageManager.prototype.setBestScore = function(score, key) {
      this.storage.setItem(key || this.bestScoreKey, score);
    };

    LocalStorageManager.prototype.getGameState = function(key) {
      var stateJSON = this.storage.getItem(key || this.gameStateKey);
      return stateJSON ? JSON.parse(stateJSON) : null;
    };

    LocalStorageManager.prototype.setGameState = function(gameState, key) {
      this.storage.setItem(key || this.gameStateKey, JSON.stringify(gameState));
    };

    LocalStorageManager.prototype.clearGameState = function(key) {
      this.storage.removeItem(key || this.gameStateKey);
    };

    // Tile
    function Tile(position, value) {
      this.x = position.x;
      this.y = position.y;
      this.value = value || 2;
      this.previousPosition = null;
      this.mergedFrom = null;
    }

    Tile.prototype.savePosition = function() {
      this.previousPosition = { x: this.x, y: this.y };
    };

    Tile.prototype.updatePosition = function(position) {
      this.x = position.x;
      this.y = position.y;
    };

    Tile.prototype.serialize = function() {
      return {
        position: {
          x: this.x,
          y: this.y
        },
        value: this.value
      };
    };

    // Grid
    function Grid(width, height, previousState) {
      this.width = width;
      this.height = height;
      this.cells = previousState ? this.fromState(previousState) : this.empty();
    }

    Grid.prototype.empty = function() {
      var cells = [];
      for (var x = 0; x < this.width; x++) {
        var row = cells[x] = [];
        for (var y = 0; y < this.height; y++) {
          row.push(null);
        }
      }
      return cells;
    };

    Grid.prototype.fromState = function(state) {
      var cells = [];
      for (var x = 0; x < this.width; x++) {
        var row = cells[x] = [];
        for (var y = 0; y < this.height; y++) {
          var tile = state[x][y];
          row.push(tile ? new Tile(tile.position, tile.value) : null);
        }
      }
      return cells;
    };

    Grid.prototype.randomAvailableCell = function() {
      var cells = this.availableCells();
      if (cells.length) {
        return cells[Math.floor(Math.random() * cells.length)];
      }
    };

    Grid.prototype.availableCells = function() {
      var cells = [];
      this.eachCell(function(x, y, tile) {
        if (!tile) {
          cells.push({ x: x, y: y });
        }
      });
      return cells;
    };

    Grid.prototype.eachCell = function(callback) {
      for (var x = 0; x < this.width; x++) {
        for (var y = 0; y < this.height; y++) {
          callback(x, y, this.cells[x][y]);
        }
      }
    };

    Grid.prototype.cellsAvailable = function() {
      return !!this.availableCells().length;
    };

    Grid.prototype.cellAvailable = function(cell) {
      return !this.cellOccupied(cell);
    };

    Grid.prototype.cellOccupied = function(cell) {
      return !!this.cellContent(cell);
    };

    Grid.prototype.cellContent = function(cell) {
      if (this.withinBounds(cell)) {
        return this.cells[cell.x][cell.y];
      } else {
        return null;
      }
    };

    Grid.prototype.insertTile = function(tile) {
      this.cells[tile.x][tile.y] = tile;
    };

    Grid.prototype.removeTile = function(tile) {
      this.cells[tile.x][tile.y] = null;
    };

    Grid.prototype.withinBounds = function(position) {
      return position.x >= 0 && position.x < this.width &&
             position.y >= 0 && position.y < this.height;
    };

    Grid.prototype.serialize = function() {
      var cellState = [];
      for (var x = 0; x < this.width; x++) {
        var row = cellState[x] = [];
        for (var y = 0; y < this.height; y++) {
          row.push(this.cells[x][y] ? this.cells[x][y].serialize() : null);
        }
      }
      return {
        width: this.width,
        height: this.height,
        cells: cellState
      };
    };

    // HTMLActuator
    function HTMLActuator() {
      this.tileContainer = document.querySelector(".tile-container");
      this.scoreContainer = document.querySelector(".score-container");
      this.bestContainer = document.querySelector(".best-container");
      this.messageContainer = document.querySelector(".game-message");
      this.undoButton = document.getElementById("undo-button");
      this.gridContainer = document.getElementById("grid-container");
      this.gameContainer = document.getElementById("game-container");
      this.score = 0;
    }

    HTMLActuator.prototype.actuate = function(grid, metadata) {
      var self = this;
      window.requestAnimationFrame(function() {
        self.clearContainer(self.tileContainer);
        
        // Always update grid on actuate
        self.updateGridSize(grid.width, grid.height);
        
        grid.cells.forEach(function(column) {
          column.forEach(function(cell) {
            if (cell) {
              self.addTile(cell, grid.width, grid.height);
            }
          });
        });
        self.updateScore(metadata.score);
        self.updateBestScore(metadata.bestScore);
        self.updateUndoButton(metadata.undoAvailable);
        if (metadata.terminated) {
          if (metadata.over) {
            self.message(false);
          } else if (metadata.won) {
            self.message(true);
          }
        }
      });
    };

    HTMLActuator.prototype.updateGridSize = function(width, height) {
      // Calculate cell size based on grid dimensions
      var maxSize = 500;
      var gap = 15;
      var padding = 15;
      
      var availableSpace = maxSize - (2 * padding) - ((Math.max(width, height) - 1) * gap);
      var cellSize = Math.floor(availableSpace / Math.max(width, height));
      
      cellSize = Math.max(cellSize, 40);
      
      var containerWidth = (cellSize * width) + ((width - 1) * gap) + (2 * padding);
      var containerHeight = (cellSize * height) + ((height - 1) * gap) + (2 * padding);
      
      this.gameContainer.style.width = containerWidth + 'px';
      this.gameContainer.style.height = containerHeight + 'px';
      
      this.cellSize = cellSize;
      this.cellGap = gap;
      
      var fontSize = Math.floor(cellSize * 0.5);
      var smallFontSize = Math.floor(cellSize * 0.35);
      var tinyFontSize = Math.floor(cellSize * 0.25);
      
      // Rebuild grid cells
      this.clearContainer(this.gridContainer);
      for (var y = 0; y < height; y++) {
        var row = document.createElement("div");
        row.className = "grid-row";
        for (var x = 0; x < width; x++) {
          var cell = document.createElement("div");
          cell.className = "grid-cell";
          cell.style.width = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          row.appendChild(cell);
        }
        this.gridContainer.appendChild(row);
      }
      
      // Update dynamic CSS
      var styleId = 'dynamic-tile-styles';
      var existingStyle = document.getElementById(styleId);
      if (existingStyle) {
        existingStyle.remove();
      }
      
      var style = document.createElement('style');
      style.id = styleId;
      var css = '.tile, .tile .tile-inner { width: ' + cellSize + 'px; height: ' + cellSize + 'px; line-height: ' + cellSize + 'px; }';
      css += '.tile .tile-inner { font-size: ' + fontSize + 'px; }';
      css += '.tile.tile-128 .tile-inner, .tile.tile-256 .tile-inner, .tile.tile-512 .tile-inner { font-size: ' + smallFontSize + 'px; }';
      css += '.tile.tile-1024 .tile-inner, .tile.tile-2048 .tile-inner { font-size: ' + tinyFontSize + 'px; }';
      css += '.tile.tile-super .tile-inner { font-size: ' + Math.floor(cellSize * 0.3) + 'px; }';
      
      for (var x = 0; x < width; x++) {
        for (var y = 0; y < height; y++) {
          var translateX = x * (cellSize + gap);
          var translateY = y * (cellSize + gap);
          css += '.tile.tile-position-' + (x + 1) + '-' + (y + 1) + ' { transform: translate(' + translateX + 'px, ' + translateY + 'px); }';
        }
      }
      
      style.textContent = css;
      document.head.appendChild(style);
    };

    HTMLActuator.prototype.continueGame = function() {
      this.clearMessage();
    };

    HTMLActuator.prototype.clearContainer = function(container) {
      while (container.firstChild) {
        container.removeChild(container.firstChild);
      }
    };

    HTMLActuator.prototype.addTile = function(tile, gridWidth, gridHeight) {
      var self = this;
      var wrapper = document.createElement("div");
      var inner = document.createElement("div");
      var position = tile.previousPosition || { x: tile.x, y: tile.y };
      var positionClass = this.positionClass(position);
      var classes = ["tile", "tile-" + tile.value, positionClass];

      if (tile.value > 2048) classes.push("tile-super");

      this.applyClasses(wrapper, classes);
      inner.classList.add("tile-inner");
      inner.textContent = tile.value;

      if (tile.previousPosition) {
        window.requestAnimationFrame(function() {
          classes[2] = self.positionClass({ x: tile.x, y: tile.y });
          self.applyClasses(wrapper, classes);
        });
      } else if (tile.mergedFrom) {
        classes.push("tile-merged");
        this.applyClasses(wrapper, classes);
        tile.mergedFrom.forEach(function(merged) {
          self.addTile(merged, gridWidth, gridHeight);
        });
      } else {
        classes.push("tile-new");
        this.applyClasses(wrapper, classes);
      }

      wrapper.appendChild(inner);
      this.tileContainer.appendChild(wrapper);
    };

    HTMLActuator.prototype.applyClasses = function(element, classes) {
      element.setAttribute("class", classes.join(" "));
    };

    HTMLActuator.prototype.normalizePosition = function(position) {
      return { x: position.x + 1, y: position.y + 1 };
    };

    HTMLActuator.prototype.positionClass = function(position) {
      position = this.normalizePosition(position);
      return "tile-position-" + position.x + "-" + position.y;
    };

    HTMLActuator.prototype.updateScore = function(score) {
      this.clearContainer(this.scoreContainer);
      var difference = score - this.score;
      this.score = score;
      this.scoreContainer.textContent = this.score;
      if (difference > 0) {
        var addition = document.createElement("div");
        addition.classList.add("score-addition");
        addition.textContent = "+" + difference;
        this.scoreContainer.appendChild(addition);
      }
    };

    HTMLActuator.prototype.updateBestScore = function(bestScore) {
      this.bestContainer.textContent = bestScore;
    };

    HTMLActuator.prototype.updateUndoButton = function(undoAvailable) {
      this.undoButton.disabled = !undoAvailable;
    };

    HTMLActuator.prototype.message = function(won) {
      var type = won ? "game-won" : "game-over";
      var message = won ? "You win!" : "Game over!";
      this.messageContainer.classList.add(type);
      this.messageContainer.getElementsByTagName("p")[0].textContent = message;
    };

    HTMLActuator.prototype.clearMessage = function() {
      this.messageContainer.classList.remove("game-won");
      this.messageContainer.classList.remove("game-over");
    };

    // KeyboardInputManager
    function KeyboardInputManager() {
      this.events = {};
      if (window.navigator.msPointerEnabled) {
        this.eventTouchstart = "MSPointerDown";
        this.eventTouchmove = "MSPointerMove";
        this.eventTouchend = "MSPointerUp";
      } else {
        this.eventTouchstart = "touchstart";
        this.eventTouchmove = "touchmove";
        this.eventTouchend = "touchend";
      }
      this.listen();
    }

    KeyboardInputManager.prototype.on = function(event, callback) {
      if (!this.events[event]) {
        this.events[event] = [];
      }
      this.events[event].push(callback);
    };

    KeyboardInputManager.prototype.emit = function(event, data) {
      var callbacks = this.events[event];
      if (callbacks) {
        callbacks.forEach(function(callback) {
          callback(data);
        });
      }
    };

    KeyboardInputManager.prototype.listen = function() {
      var self = this;
      var map = {
        38: 0, 39: 1, 40: 2, 37: 3,
        75: 0, 76: 1, 74: 2, 72: 3,
        87: 0, 68: 1, 83: 2, 65: 3
      };

      document.addEventListener("keydown", function(event) {
        var modifiers = event.altKey || event.ctrlKey || event.metaKey || event.shiftKey;
        var mapped = map[event.which];
        if (!modifiers) {
          if (mapped !== undefined) {
            event.preventDefault();
            self.emit("move", mapped);
          }
        }
        if (!modifiers && event.which === 82) {
          self.restart.call(self, event);
        }
        if ((event.ctrlKey || event.metaKey) && event.which === 90 && !event.shiftKey) {
          event.preventDefault();
          self.emit("undo");
        }
      });

      this.bindButtonPress(".retry-button", this.restart);
      this.bindButtonPress(".restart-button", this.restart);
      this.bindButtonPress(".keep-playing-button", this.keepPlaying);
      this.bindButtonPress("#undo-button", this.undo);

      var touchStartClientX, touchStartClientY;
      var gameContainer = document.getElementsByClassName("game-container")[0];

      gameContainer.addEventListener(this.eventTouchstart, function(event) {
        if ((!window.navigator.msPointerEnabled && event.touches.length > 1) ||
            event.targetTouches.length > 1) {
          return;
        }
        if (window.navigator.msPointerEnabled) {
          touchStartClientX = event.pageX;
          touchStartClientY = event.pageY;
        } else {
          touchStartClientX = event.touches[0].clientX;
          touchStartClientY = event.touches[0].clientY;
        }
        event.preventDefault();
      });

      gameContainer.addEventListener(this.eventTouchmove, function(event) {
        event.preventDefault();
      });

      gameContainer.addEventListener(this.eventTouchend, function(event) {
        if ((!window.navigator.msPointerEnabled && event.touches.length > 0) ||
            event.targetTouches.length > 0) {
          return;
        }
        var touchEndClientX, touchEndClientY;
        if (window.navigator.msPointerEnabled) {
          touchEndClientX = event.pageX;
          touchEndClientY = event.pageY;
        } else {
          touchEndClientX = event.changedTouches[0].clientX;
          touchEndClientY = event.changedTouches[0].clientY;
        }
        var dx = touchEndClientX - touchStartClientX;
        var absDx = Math.abs(dx);
        var dy = touchEndClientY - touchStartClientY;
        var absDy = Math.abs(dy);
        if (Math.max(absDx, absDy) > 10) {
          self.emit("move", absDx > absDy ? (dx > 0 ? 1 : 3) : (dy > 0 ? 2 : 0));
        }
      });
    };

    KeyboardInputManager.prototype.restart = function(event) {
      event.preventDefault();
      this.emit("restart");
    };

    KeyboardInputManager.prototype.keepPlaying = function(event) {
      event.preventDefault();
      this.emit("keepPlaying");
    };

    KeyboardInputManager.prototype.undo = function(event) {
      event.preventDefault();
      this.emit("undo");
    };

    KeyboardInputManager.prototype.bindButtonPress = function(selector, fn) {
      var button = document.querySelector(selector);
      button.addEventListener("click", fn.bind(this));
      button.addEventListener(this.eventTouchend, fn.bind(this));
    };

    // GameManager
    function GameManager(width, height, InputManager, Actuator, StorageManager) {
      this.width = width;
      this.height = height;
      this.inputManager = new InputManager;
      this.storageManager = new StorageManager;
      this.actuator = new Actuator;
      this.startTiles = 2;
      this.undoStack = [];
      this.bestScoreKey = 'bestScore_' + width + 'x' + height;
      this.gameStateKey = 'gameState_' + width + 'x' + height;
      this.inputManager.on("move", this.move.bind(this));
      this.inputManager.on("restart", this.restart.bind(this));
      this.inputManager.on("keepPlaying", this.keepPlaying.bind(this));
      this.inputManager.on("undo", this.undo.bind(this));
      this.setup();
    }

    GameManager.prototype.restart = function() {
      this.storageManager.clearGameState(this.gameStateKey);
      this.actuator.continueGame();
      this.undoStack = [];
      this.setup();
    };

    GameManager.prototype.keepPlaying = function() {
      this.keepPlaying = true;
      this.actuator.continueGame();
    };

    GameManager.prototype.isGameTerminated = function() {
      return this.over || (this.won && !this.keepPlaying);
    };

    GameManager.prototype.setup = function() {
      var previousState = this.storageManager.getGameState(this.gameStateKey);
      
      if (previousState && 
          previousState.grid && 
          previousState.grid.width === this.width && 
          previousState.grid.height === this.height) {
        this.grid = new Grid(previousState.grid.width, previousState.grid.height, previousState.grid.cells);
        this.score = previousState.score;
        this.over = previousState.over;
        this.won = previousState.won;
        this.keepPlaying = previousState.keepPlaying;
      } else {
        this.storageManager.clearGameState(this.gameStateKey);
        this.grid = new Grid(this.width, this.height);
        this.score = 0;
        this.over = false;
        this.won = false;
        this.keepPlaying = false;
        this.addStartTiles();
      }
      this.actuate();
    };

    GameManager.prototype.addStartTiles = function() {
      for (var i = 0; i < this.startTiles; i++) {
        this.addRandomTile();
      }
    };

    GameManager.prototype.addRandomTile = function() {
      if (this.grid.cellsAvailable()) {
        var value = Math.random() < 0.9 ? 2 : 4;
        var tile = new Tile(this.grid.randomAvailableCell(), value);
        this.grid.insertTile(tile);
      }
    };

    GameManager.prototype.actuate = function() {
      var currentBest = this.storageManager.getBestScore(this.bestScoreKey);
      if (currentBest < this.score) {
        this.storageManager.setBestScore(this.score, this.bestScoreKey);
      }
      if (this.over) {
        this.storageManager.clearGameState(this.gameStateKey);
      } else {
        this.storageManager.setGameState(this.serialize(), this.gameStateKey);
      }
      this.actuator.actuate(this.grid, {
        score: this.score,
        over: this.over,
        won: this.won,
        bestScore: this.storageManager.getBestScore(this.bestScoreKey),
        terminated: this.isGameTerminated(),
        undoAvailable: this.undoStack.length > 0
      });
    };

    GameManager.prototype.serialize = function() {
      return {
        grid: this.grid.serialize(),
        score: this.score,
        over: this.over,
        won: this.won,
        keepPlaying: this.keepPlaying
      };
    };

    GameManager.prototype.saveState = function() {
      this.undoStack.push({
        grid: this.grid.serialize(),
        score: this.score,
        over: this.over,
        won: this.won
      });
      
      if (this.undoStack.length > 50) {
        this.undoStack.shift();
      }
    };

    GameManager.prototype.undo = function() {
      if (this.undoStack.length === 0) return;
      
      var previousState = this.undoStack.pop();
      this.grid = new Grid(previousState.grid.width, previousState.grid.height, previousState.grid.cells);
      this.score = previousState.score;
      this.over = previousState.over;
      this.won = previousState.won;
      
      this.actuate();
    };

    GameManager.prototype.prepareTiles = function() {
      this.grid.eachCell(function(x, y, tile) {
        if (tile) {
          tile.mergedFrom = null;
          tile.savePosition();
        }
      });
    };

    GameManager.prototype.moveTile = function(tile, cell) {
      this.grid.cells[tile.x][tile.y] = null;
      this.grid.cells[cell.x][cell.y] = tile;
      tile.updatePosition(cell);
    };

    GameManager.prototype.move = function(direction) {
      var self = this;
      if (this.isGameTerminated()) return;
      var cell, tile;
      var vector = this.getVector(direction);
      var traversals = this.buildTraversals(vector);
      var moved = false;

      this.saveState();
      this.prepareTiles();
      
      traversals.x.forEach(function(x) {
        traversals.y.forEach(function(y) {
          cell = { x: x, y: y };
          tile = self.grid.cellContent(cell);
          if (tile) {
            var positions = self.findFarthestPosition(cell, vector);
            var next = self.grid.cellContent(positions.next);
            if (next && next.value === tile.value && !next.mergedFrom) {
              var merged = new Tile(positions.next, tile.value * 2);
              merged.mergedFrom = [tile, next];
              self.grid.insertTile(merged);
              self.grid.removeTile(tile);
              tile.updatePosition(positions.next);
              self.score += merged.value;
              if (merged.value === 2048) self.won = true;
            } else {
              self.moveTile(tile, positions.farthest);
            }
            if (!self.positionsEqual(cell, tile)) {
              moved = true;
            }
          }
        });
      });
      
      if (moved) {
        this.addRandomTile();
        if (!this.movesAvailable()) {
          this.over = true;
        }
        this.actuate();
      } else {
        this.undoStack.pop();
      }
    };

    GameManager.prototype.getVector = function(direction) {
      var map = {
        0: { x: 0, y: -1 },
        1: { x: 1, y: 0 },
        2: { x: 0, y: 1 },
        3: { x: -1, y: 0 }
      };
      return map[direction];
    };

    GameManager.prototype.buildTraversals = function(vector) {
      var traversals = { x: [], y: [] };
      for (var pos = 0; pos < this.width; pos++) {
        traversals.x.push(pos);
      }
      for (var pos = 0; pos < this.height; pos++) {
        traversals.y.push(pos);
      }
      if (vector.x === 1) traversals.x = traversals.x.reverse();
      if (vector.y === 1) traversals.y = traversals.y.reverse();
      return traversals;
    };

    GameManager.prototype.findFarthestPosition = function(cell, vector) {
      var previous;
      do {
        previous = cell;
        cell = { x: previous.x + vector.x, y: previous.y + vector.y };
      } while (this.grid.withinBounds(cell) && this.grid.cellAvailable(cell));
      return {
        farthest: previous,
        next: cell
      };
    };

    GameManager.prototype.movesAvailable = function() {
      return this.grid.cellsAvailable() || this.tileMatchesAvailable();
    };

    GameManager.prototype.tileMatchesAvailable = function() {
      var self = this;
      var tile;
      for (var x = 0; x < this.width; x++) {
        for (var y = 0; y < this.height; y++) {
          tile = this.grid.cellContent({ x: x, y: y });
          if (tile) {
            for (var direction = 0; direction < 4; direction++) {
              var vector = self.getVector(direction);
              var cell = { x: x + vector.x, y: y + vector.y };
              var other = self.grid.cellContent(cell);
              if (other && other.value === tile.value) {
                return true;
              }
            }
          }
        }
      }
      return false;
    };

    GameManager.prototype.positionsEqual = function(first, second) {
      return first.x === second.x && first.y === second.y;
    };

    // Grid Size Controller
    var currentGame = null;

    function initGame(width, height) {
      if (currentGame) {
        currentGame.inputManager.events = {};
      }
      
      currentGame = new GameManager(width, height, KeyboardInputManager, HTMLActuator, LocalStorageManager);
      document.getElementById('current-grid-size').textContent = width + '×' + height;
    }

    // Preset buttons
    var presetButtons = document.querySelectorAll('.preset-btn');
    presetButtons.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var width = parseInt(this.getAttribute('data-width'));
        var height = parseInt(this.getAttribute('data-height'));
        
        presetButtons.forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        
        document.getElementById('custom-width').value = width;
        document.getElementById('custom-height').value = height;
        
        initGame(width, height);
      });
    });

    // Custom grid
    document.getElementById('apply-custom').addEventListener('click', function() {
      var width = parseInt(document.getElementById('custom-width').value);
      var height = parseInt(document.getElementById('custom-height').value);
      
      width = Math.max(3, Math.min(10, width));
      height = Math.max(3, Math.min(10, height));
      
      document.getElementById('custom-width').value = width;
      document.getElementById('custom-height').value = height;
      
      presetButtons.forEach(function(b) { b.classList.remove('active'); });
      
      initGame(width, height);
    });

    // Initialize
    window.requestAnimationFrame(function() {
      initGame(4, 4);
    });
  </script>
